services:
  postgres:
    image: postgres:16
    container_name: plantaopro-postgres
    environment:
      POSTGRES_DB: ${PLANTAOPRO_POSTGRES_DB:-plantaopro}
      POSTGRES_USER: ${PLANTAOPRO_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${PLANTAOPRO_POSTGRES_PASSWORD:-CHANGE_ME_LOCAL_POSTGRES}
    ports:
      - "${PLANTAOPRO_POSTGRES_PORT:-5432}:5432"
    volumes:
      - plantaopro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  plantaopro_pgdata:
