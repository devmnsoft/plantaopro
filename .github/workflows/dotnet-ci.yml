name: dotnet-ci

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  Jwt__Key: PLANTAOPRO_CI_JWT_KEY_2026_CHANGE_ME_64_CHARS
  Jwt__Issuer: PlantaoPro
  Jwt__Audience: PlantaoPro

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Dotnet diagnostics
        run: dotnet --info
      - name: Restore
        run: dotnet restore backend/PlantaoPro.sln
      - name: Build
        run: dotnet build backend/PlantaoPro.sln -c Release --no-restore
      - name: Test
        run: dotnet test backend/PlantaoPro.Tests/PlantaoPro.Tests.csproj -c Release --no-build --logger "console;verbosity=detailed"

  database-clean-install:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Apply canonical migrations on empty database
        run: scripts/apply-canonical-migrations.sh
      - name: Verify migration control table
        run: psql -v ON_ERROR_STOP=1 -c "SELECT id, applied_at FROM plantaopro.schema_migrations ORDER BY id;"

  database-upgrade:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Simulate previous version
        run: |
          psql -v ON_ERROR_STOP=1 -f database/PlantaoPro_PostgreSQL_Completo.sql
          psql -v ON_ERROR_STOP=1 -f database/migrations/2026_v113_operacional_real.sql
          psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE SCHEMA IF NOT EXISTS plantaopro;
          CREATE TABLE IF NOT EXISTS plantaopro.schema_migrations (
              id text PRIMARY KEY,
              script_path text NOT NULL,
              checksum text NOT NULL,
              applied_at timestamptz NOT NULL DEFAULT now()
          );
          INSERT INTO plantaopro.schema_migrations (id, script_path, checksum) VALUES
              ('000_base_schema', 'database/PlantaoPro_PostgreSQL_Completo.sql', 'pre-v118-upgrade-baseline'),
              ('200_v113_operacional', 'database/migrations/2026_v113_operacional_real.sql', 'pre-v118-upgrade-baseline')
          ON CONFLICT (id) DO NOTHING;
          SQL
      - name: Upgrade through canonical migrations
        run: scripts/apply-canonical-migrations.sh
      - name: Re-run canonical migrations to verify idempotency
        run: scripts/apply-canonical-migrations.sh

  runtime-e2e:
    runs-on: ubuntu-latest
    needs:
      - build-test
      - database-clean-install
      - database-upgrade
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
      ConnectionStrings__Default: Host=localhost;Port=5432;Database=plantaopro;Username=plantaopro;Password=plantaopro_demo_ci
      ASPNETCORE_URLS: http://localhost:5000
      ASPNETCORE_ENVIRONMENT: Development
      BASE_URL: http://localhost:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Apply canonical migrations
        run: scripts/apply-canonical-migrations.sh
      - name: Restore
        run: dotnet restore backend/PlantaoPro.sln
      - name: Build API and Web
        run: dotnet build backend/PlantaoPro.sln -c Release --no-restore
      - name: Start API
        run: dotnet run --project backend/PlantaoPro.Api/PlantaoPro.Api.csproj -c Release --no-build > api-v118.log 2>&1 &
      - name: Wait health and swagger
        run: |
          for i in {1..30}; do curl -fsS http://localhost:5000/api/health && curl -fsS http://localhost:5000/swagger/v1/swagger.json >/dev/null && exit 0; sleep 2; done
          cat api-v118.log
          exit 1
      - name: Smoke v1.17 chain
        run: bash scripts/smoke-test-v117.sh
      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-e2e-v118-evidence
          path: |
            api-v118.log
            docs/homologacao/v117-smoke-result.md
            docs/homologacao/v117-smoke-result.json

  mobile-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Mobile validation placeholder
        run: |
          if [ -f mobile/package.json ]; then
            echo "mobile/package.json found; add project-specific lint/typecheck commands here."
          else
            echo "No mobile/package.json found in this repository snapshot."
          fi
