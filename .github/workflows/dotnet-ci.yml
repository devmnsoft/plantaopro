name: dotnet-ci

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Dotnet diagnostics
        run: dotnet --info

      - name: Restore
        run: dotnet restore backend/PlantaoPro.sln

      - name: Build
        run: dotnet build backend/PlantaoPro.sln -c Release --no-restore

      - name: Test
        run: dotnet test backend/PlantaoPro.Tests/PlantaoPro.Tests.csproj -c Release --no-build --verbosity normal
