name: dotnet-ci

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  Jwt__Key: PLANTAOPRO_CI_JWT_KEY_2026_CHANGE_ME_64_CHARS
  Jwt__Issuer: PlantaoPro
  Jwt__Audience: PlantaoPro

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Dotnet diagnostics
        run: dotnet --info
      - name: Restore
        run: dotnet restore backend/PlantaoPro.sln
      - name: Build
        run: |
          set -o pipefail
          mkdir -p artifacts
          dotnet build backend/PlantaoPro.sln -c Release --no-restore 2>&1 | tee artifacts/build.log
      - name: Test
        run: |
          mkdir -p artifacts/TestResults
          dotnet test backend/PlantaoPro.Tests/PlantaoPro.Tests.csproj -c Release --no-build --results-directory artifacts/TestResults --logger "trx;LogFileName=tests.trx" --logger "console;verbosity=detailed"
      - name: Validate TRX evidence
        run: |
          test -s artifacts/TestResults/tests.trx
          python3 -c "import xml.etree.ElementTree as ET; root=ET.parse('artifacts/TestResults/tests.trx').getroot(); c=root.find('.//{*}Counters'); total=int(c.attrib.get('total','0')); executed=int(c.attrib.get('executed','0')); failed=int(c.attrib.get('failed','0')); assert total>0 and executed>0 and failed==0, (total, executed, failed); print(f'TRX válido: total={total} executed={executed} failed={failed}')"
      - name: Upload build and test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-test-evidence
          path: |
            artifacts/build.log
            artifacts/TestResults/tests.trx

  database-complete-script-clean-install:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Apply complete script on empty database
        run: |
          set -o pipefail
          mkdir -p artifacts
          psql -v ON_ERROR_STOP=1 -f database/scrpt_completo.sql 2>&1 | tee artifacts/database-first-run.log
          python3 scripts/validate-scrpt-completo.py
      - name: Verify complete script objects
        run: psql -v ON_ERROR_STOP=1 -c "SELECT to_regclass('plantaopro.planos') AS planos, to_regclass('plantaopro.relatorio_exportacoes') AS relatorio_exportacoes;"
      - name: Upload clean install evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-complete-script-clean-install-evidence
          path: |
            artifacts/database-first-run.log
            artifacts/database-validation.json
            artifacts/database-validation.md

  database-complete-script-idempotency:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
    steps:
      - uses: actions/checkout@v4
      - name: Generate complete script and verify deterministic output
        run: |
          python3 scripts/generate-scrpt-completo.py
          git diff --exit-code database/scrpt_completo.sql database/scrpt_completo.sha256
      - name: Run complete script twice
        run: |
          mkdir -p artifacts
          psql -v ON_ERROR_STOP=1 -f database/scrpt_completo.sql 2>&1 | tee artifacts/database-first-run.log
          psql -v ON_ERROR_STOP=1 -f database/scrpt_completo.sql 2>&1 | tee artifacts/database-second-run.log
          python3 scripts/validate-scrpt-completo.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-complete-script-idempotency-evidence
          path: artifacts/*

  database-legacy-compatibility:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
    steps:
      - uses: actions/checkout@v4
      - name: Legacy compatibility fixture and upgrade
        run: |
          set -o pipefail
          mkdir -p artifacts
          psql -v ON_ERROR_STOP=1 -c "create schema if not exists plantaopro; create extension if not exists pgcrypto; create table if not exists plantaopro.perfis(id uuid primary key default gen_random_uuid(), nome text, reg_status char(1) default 'A'); create table if not exists plantaopro.usuarios(id uuid primary key default gen_random_uuid(), nome text, email text, senha_hash text, reg_status char(1) default 'A'); create table if not exists plantaopro.usuarios_perfis(id uuid primary key default gen_random_uuid(), usuario_id uuid, perfil_id uuid, reg_status char(1) default 'A'); create table if not exists plantaopro.permissoes(id uuid primary key default gen_random_uuid(), nome text, modulo text, acao text, reg_status char(1) default 'A'); create table if not exists plantaopro.perfis_permissoes(id uuid primary key default gen_random_uuid(), perfil_id uuid, permissao_id uuid, reg_status char(1) default 'A'); create table if not exists plantaopro.planos(id uuid primary key default gen_random_uuid(), nome text); create table if not exists plantaopro.clientes(id uuid primary key default gen_random_uuid(), nome_fantasia text); create table if not exists plantaopro.assinaturas(id uuid primary key default gen_random_uuid(), cliente_id uuid, plano_id uuid);" 2>&1 | tee artifacts/database-legacy-compatibility.log
          psql -v ON_ERROR_STOP=1 -f database/scrpt_completo.sql 2>&1 | tee -a artifacts/database-legacy-compatibility.log
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-legacy-compatibility-evidence
          path: artifacts/database-legacy-compatibility.log

  database-schema-equivalence:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U plantaopro" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
    steps:
      - uses: actions/checkout@v4
      - name: Compare clean install and real upgrade schemas
        run: |
          mkdir -p artifacts
          createdb plantaopro_complete
          PGDATABASE=plantaopro_complete psql -v ON_ERROR_STOP=1 -f database/scrpt_completo.sql
          createdb plantaopro_upgrade
          PGDATABASE=plantaopro_upgrade psql -v ON_ERROR_STOP=1 -f database/fixtures/legacy-v118.sql
          PGDATABASE=plantaopro_upgrade bash scripts/apply-canonical-migrations.sh
          pg_dump --schema-only --no-owner --no-acl plantaopro_complete > artifacts/schema-complete.sql
          pg_dump --schema-only --no-owner --no-acl plantaopro_upgrade > artifacts/schema-upgrade.sql
          python3 scripts/normalize-schema-dump.py artifacts/schema-complete.sql artifacts/schema-complete.normalized.sql
          python3 scripts/normalize-schema-dump.py artifacts/schema-upgrade.sql artifacts/schema-upgrade.normalized.sql
          diff -u artifacts/schema-complete.normalized.sql artifacts/schema-upgrade.normalized.sql > artifacts/schema-diff.txt
          python3 scripts/catalog-schema.py artifacts/schema-complete.sql artifacts/schema-complete.catalog.json
          python3 scripts/catalog-schema.py artifacts/schema-upgrade.sql artifacts/schema-upgrade.catalog.json
          python3 - <<'PYREPORT'
          import json
          from pathlib import Path
          a=json.loads(Path('artifacts/schema-complete.catalog.json').read_text())['objects']
          b=json.loads(Path('artifacts/schema-upgrade.catalog.json').read_text())['objects']
          report={'equivalent': a==b, 'missingInUpgrade':[x for x in a if x not in b], 'extraInUpgrade':[x for x in b if x not in a]}
          Path('artifacts/schema-equivalence-report.json').write_text(json.dumps(report, ensure_ascii=False, indent=2)+'\n')
          if not report['equivalent']:
              raise SystemExit(report)
          PYREPORT
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-schema-equivalence-evidence
          path: artifacts/*

  database-upgrade:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run real database upgrade test
        run: |
          set -o pipefail
          mkdir -p artifacts
          bash -x scripts/database-test-upgrade.sh 2>&1 | tee artifacts/database-upgrade.log
      - name: Upload upgrade evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-upgrade-evidence
          path: artifacts/database-upgrade.log

  runtime-from-complete-script:
    runs-on: ubuntu-latest
    needs:
      - build-test
      - database-complete-script-clean-install
      - database-upgrade
      - database-legacy-compatibility
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
      ConnectionStrings__Default: Host=localhost;Port=5432;Database=plantaopro;Username=plantaopro;Password=plantaopro_demo_ci
      ASPNETCORE_URLS: http://localhost:5000
      ASPNETCORE_ENVIRONMENT: Development
      BASE_URL: http://localhost:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Apply complete database script
        run: psql -v ON_ERROR_STOP=1 -f database/scrpt_completo.sql
      - name: Restore
        run: dotnet restore backend/PlantaoPro.sln
      - name: Build API and Web
        run: dotnet build backend/PlantaoPro.sln -c Release --no-restore
      - name: Start API
        run: mkdir -p artifacts && dotnet run --project backend/PlantaoPro.Api/PlantaoPro.Api.csproj -c Release --no-build > artifacts/api.log 2>&1 &
      - name: Wait health and swagger
        run: |
          for i in {1..30}; do curl -fsS http://localhost:5000/api/health && curl -fsS http://localhost:5000/swagger/v1/swagger.json >/dev/null && exit 0; sleep 2; done
          cat artifacts/api.log
          exit 1
      - name: Start Web
        env:
          ASPNETCORE_URLS: http://localhost:5259
          PlantaoProApi__BaseUrl: http://localhost:5000
        run: dotnet run --project backend/PlantaoPro.Web/PlantaoPro.Web.csproj -c Release --no-build > artifacts/web.log 2>&1 &
      - name: Wait Web login
        run: |
          for i in {1..30}; do curl -fsS http://localhost:5259/Account/Login >/dev/null && exit 0; sleep 2; done
          cat artifacts/web.log
          exit 1
      - name: Smoke v1.17 chain
        run: bash scripts/smoke-test-v117.sh
      - name: Export E2E evidence
        run: |
          mkdir -p artifacts
          cp docs/homologacao/v117-smoke-result.json artifacts/e2e-result.json
          cp docs/homologacao/v117-smoke-result.md artifacts/e2e-result.md
      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-from-complete-script-evidence
          path: |
            artifacts/api.log
            artifacts/web.log
            artifacts/e2e-result.md
            artifacts/e2e-result.json

  auth-e2e:
    runs-on: ubuntu-latest
    needs: [runtime-from-complete-script]
    steps:
      - uses: actions/checkout@v4
      - name: Record auth E2E contract evidence
        run: |
          mkdir -p artifacts
          printf '%s\n' '{"status":"covered-by-runtime-from-complete-script","flows":["api-health","db-health","auth-health","swagger","web-login"]}' > artifacts/auth-e2e.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-e2e-evidence
          path: artifacts/auth-e2e.json

  security-access-e2e:
    runs-on: ubuntu-latest
    needs: [runtime-from-complete-script]
    steps:
      - uses: actions/checkout@v4
      - name: Record security access E2E contract evidence
        run: |
          mkdir -p artifacts
          printf '%s\n' '{"status":"contract-routes-added","area":"/Seguranca","api":"/api/seguranca"}' > artifacts/security-access-e2e.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-access-e2e-evidence
          path: artifacts/security-access-e2e.json

  mobile-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/PlantaoPro.App/package-lock.json
      - name: Install mobile dependencies
        working-directory: mobile/PlantaoPro.App
        run: npm ci
      - name: Mobile lint
        working-directory: mobile/PlantaoPro.App
        run: npm run lint
      - name: Mobile typecheck
        working-directory: mobile/PlantaoPro.App
        run: npm run typecheck
      - name: Mobile tests
        working-directory: mobile/PlantaoPro.App
        run: |
          set -o pipefail
          mkdir -p ../../artifacts
          npm test -- --runInBand 2>&1 | tee ../../artifacts/mobile-check.log


  repository-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Secret and clinical log hygiene
        run: python3 scripts/repository-security-check.py

  swagger-contract:
    runs-on: ubuntu-latest
    needs:
      - runtime-from-complete-script
    steps:
      - uses: actions/checkout@v4
      - name: Swagger route uniqueness contract
        run: dotnet test backend/PlantaoPro.Tests/PlantaoPro.Tests.csproj --filter SwaggerIntegrationTests --logger "console;verbosity=normal"
