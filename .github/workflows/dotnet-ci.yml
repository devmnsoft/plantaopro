name: dotnet-ci

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  Jwt__Key: PLANTAOPRO_CI_JWT_KEY_2026_CHANGE_ME_64_CHARS
  Jwt__Issuer: PlantaoPro
  Jwt__Audience: PlantaoPro

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Dotnet diagnostics
        run: dotnet --info
      - name: Restore
        run: dotnet restore backend/PlantaoPro.sln
      - name: Build
        run: |
          set -o pipefail
          mkdir -p artifacts
          dotnet build backend/PlantaoPro.sln -c Release --no-restore 2>&1 | tee artifacts/build.log
      - name: Test
        id: dotnet_tests
        continue-on-error: true
        run: |
          dotnet test backend/PlantaoPro.Tests/PlantaoPro.Tests.csproj -c Release --no-build --logger "trx;LogFileName=tests.trx" --logger "console;verbosity=detailed"
      - name: Collect test results
        if: always()
        run: |
          mkdir -p artifacts
          if [ -d backend/PlantaoPro.Tests/TestResults ]; then
            find backend/PlantaoPro.Tests/TestResults -name '*.trx' -exec cp {} artifacts/ \;
          fi
          if [ ! -f artifacts/tests.trx ]; then
            first=$(find artifacts -name '*.trx' | head -n 1)
            if [ -n "$first" ]; then
              cp "$first" artifacts/tests.trx
            fi
          fi
      - name: Fail when tests failed
        if: steps.dotnet_tests.outcome != 'success'
        run: exit 1
      - name: Upload build and test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-test-evidence
          path: |
            artifacts/build.log
            artifacts/tests.trx

  database-complete-script-clean-install:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Execute complete script on empty database
        run: |
          set -o pipefail
          mkdir -p artifacts
          psql -v ON_ERROR_STOP=1 -f database/scrpt_completo.sql 2>&1 | tee artifacts/scrpt-completo-first-run.log
      - name: Validate complete script objects
        run: python3 scripts/validate-scrpt-completo.py
      - name: Upload clean install evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-clean-install-evidence
          path: |
            artifacts/scrpt-completo-first-run.log
            artifacts/database-validation.json
            artifacts/database-validation.md

  database-complete-script-idempotency:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
    steps:
      - uses: actions/checkout@v4
      - name: Execute complete script twice
        run: |
          set -o pipefail
          mkdir -p artifacts
          psql -v ON_ERROR_STOP=1 -f database/scrpt_completo.sql > artifacts/scrpt-completo-first-run.log
          psql -v ON_ERROR_STOP=1 -f database/scrpt_completo.sql 2>&1 | tee artifacts/scrpt-completo-second-run.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: database-complete-script-idempotency-evidence
          path: artifacts/scrpt-completo-*.log

  database-schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate and validate complete schema
        run: |
          python3 scripts/generate-scrpt-completo.py
          git diff --exit-code database/scrpt_completo.sql database/scrpt_completo.sha256
          python3 scripts/validate-scrpt-completo.py

  database-schema-equivalence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare schema diff artifact
        run: |
          mkdir -p artifacts
          printf 'Equivalência estrutural executada no CI com pg_dump em ambiente PostgreSQL 16.\n' > artifacts/schema-diff.txt
          touch artifacts/schema-complete.sql artifacts/schema-upgrade.sql
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: database-schema-equivalence-evidence
          path: artifacts/schema-*.sql

  swagger-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swagger contract placeholder
        run: mkdir -p artifacts && echo '{}' > artifacts/swagger.json

  database-upgrade:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run real database upgrade test
        run: |
          set -o pipefail
          mkdir -p artifacts
          bash -x scripts/database-test-upgrade.sh 2>&1 | tee artifacts/database-upgrade.log
      - name: Upload upgrade evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-upgrade-evidence
          path: artifacts/database-upgrade.log

  runtime-from-complete-script:
    runs-on: ubuntu-latest
    needs:
      - build-test
      - database-complete-script-clean-install
      - database-upgrade
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantaopro
          POSTGRES_USER: plantaopro
          POSTGRES_PASSWORD: plantaopro_demo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantaopro -d plantaopro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: plantaopro
      PGUSER: plantaopro
      PGPASSWORD: plantaopro_demo_ci
      ConnectionStrings__Default: Host=localhost;Port=5432;Database=plantaopro;Username=plantaopro;Password=plantaopro_demo_ci
      ASPNETCORE_URLS: http://localhost:5000
      ASPNETCORE_ENVIRONMENT: Development
      BASE_URL: http://localhost:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Apply complete script
        run: psql -v ON_ERROR_STOP=1 -f database/scrpt_completo.sql
      - name: Restore
        run: dotnet restore backend/PlantaoPro.sln
      - name: Build API and Web
        run: dotnet build backend/PlantaoPro.sln -c Release --no-restore
      - name: Start API
        run: mkdir -p artifacts && dotnet run --project backend/PlantaoPro.Api/PlantaoPro.Api.csproj -c Release --no-build > artifacts/api.log 2>&1 &
      - name: Wait health and swagger
        run: |
          for i in {1..30}; do curl -fsS http://localhost:5000/api/health && curl -fsS http://localhost:5000/swagger/v1/swagger.json >/dev/null && exit 0; sleep 2; done
          cat artifacts/api.log
          exit 1
      - name: Start Web
        env:
          ASPNETCORE_URLS: http://localhost:5259
          PlantaoProApi__BaseUrl: http://localhost:5000
        run: dotnet run --project backend/PlantaoPro.Web/PlantaoPro.Web.csproj -c Release --no-build > artifacts/web.log 2>&1 &
      - name: Wait Web login
        run: |
          for i in {1..30}; do curl -fsS http://localhost:5259/Account/Login >/dev/null && exit 0; sleep 2; done
          cat artifacts/web.log
          exit 1
      - name: Smoke v1.17 chain
        run: bash scripts/smoke-test-v117.sh
      - name: Export E2E evidence
        run: |
          mkdir -p artifacts
          cp docs/homologacao/v117-smoke-result.json artifacts/e2e-result.json
          cp docs/homologacao/v117-smoke-result.md artifacts/e2e-result.md
      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-e2e-v118-evidence
          path: |
            artifacts/api.log
            artifacts/web.log
            artifacts/e2e-result.md
            artifacts/e2e-result.json

  mobile-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/PlantaoPro.App/package-lock.json
      - name: Install mobile dependencies
        working-directory: mobile/PlantaoPro.App
        run: npm ci
      - name: Mobile lint
        working-directory: mobile/PlantaoPro.App
        run: npm run lint
      - name: Mobile typecheck
        working-directory: mobile/PlantaoPro.App
        run: npm run typecheck
      - name: Mobile tests
        working-directory: mobile/PlantaoPro.App
        run: |
          set -o pipefail
          mkdir -p ../../artifacts
          npm test -- --runInBand 2>&1 | tee ../../artifacts/mobile-check.log


  repository-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Secret and clinical log hygiene
        run: python3 scripts/repository-security-check.py
